<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start Free Trial</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #000000, #111827);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      padding: 20px;
    }

    .form-box {
      max-width: 420px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      backdrop-filter: blur(12px);
      box-shadow: 0 0 25px rgba(0,255,150,0.2);
      text-align: center;
    }

    .form-box h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    .form-box p {
      color: #9ca3af;
      margin-bottom: 20px;
      font-size: 14px;
    }

    form input, form select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #1f2937;
      color: white;
      font-size: 14px;
    }

    form input:focus, form select:focus {
      outline: 2px solid #00ff99;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #00ff99;
      border: none;
      border-radius: 10px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 16px;
    }

    button:hover {
      background: #00cc77;
    }

    .login-link {
      margin-top: 15px;
      font-size: 14px;
    }

    .login-link a {
      color: #00ff99;
      text-decoration: none;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .form-box {
        padding: 20px;
      }

      .form-box h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="form-box">
    <h1>Start Your Free Trial 🚀</h1>
    <p>Manage your gym smarter with AI-powered tools</p>

    <form id="trialForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="text" id="gym" placeholder="Gym Name" required>

      <select id="plan" required>
        <option value="">Select Plan</option>
        <option>Basic</option>
        <option>Pro</option>
        <option>Enterprise</option>
      </select>

      <button type="submit">Start Free Trial</button>
    </form>

    <p class="login-link">
      Already have an account? <a href="#">Login</a>
    </p>
  </div>
</div>

<script>
  document.getElementById("trialForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let gym = document.getElementById("gym").value.trim();
    let plan = document.getElementById("plan").value;

    if (!name || !email || !gym || !plan) {
      alert("Please fill all fields!");
      return;
    }

    // Success message
    alert("🎉 Free Trial Started Successfully!");

    // Reset form
    this.reset();

    // Redirect (optional)
    // window.location.href = "dashboard.html";
  });
</script>

</body>
</html>
